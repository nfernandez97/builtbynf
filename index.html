<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nicolas Fernandez | Landing Pages for Local Businesses</title>
  <meta name="description" content="Affordable, premium-looking landing pages for local businesses that want more visibility, more calls, and more leads." />
  <style>
    :root {
      --forest: #163827;
      --forest-2: #204a33;
      --gold: #a97d2f;
      --gold-soft: #d7bf8c;
      --ink: #18211b;
      --muted: #617064;
      --line: #dde4de;
      --bg: #f7f8f5;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(20, 39, 28, 0.10);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(169,125,47,0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(22,56,39,0.08), transparent 30%),
        var(--bg);
      line-height: 1.55;
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1160px, calc(100% - 32px)); margin: 0 auto; }
    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(247,248,245,0.82);
      border-bottom: 1px solid rgba(22,56,39,0.08);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 18px; padding: 14px 0;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand img { width: 58px; height: auto; }
    .brand-copy strong {
      display: block; font-size: 0.98rem; letter-spacing: .08em; text-transform: uppercase;
      color: var(--forest);
    }
    .brand-copy span { color: var(--muted); font-size: 0.95rem; }
    .menu { display: flex; gap: 26px; align-items: center; }
    .menu a.link { font-size: 0.97rem; color: var(--muted); }
    .menu a.link:hover { color: var(--forest); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 14px 20px; border-radius: 999px; font-weight: 700; transition: .22s ease;
      border: 1px solid transparent; cursor: pointer;
    }
    .btn-primary { background: var(--forest); color: var(--white); box-shadow: var(--shadow); }
    .btn-primary:hover { background: var(--forest-2); transform: translateY(-1px); }
    .btn-secondary { background: transparent; color: var(--forest); border-color: rgba(22,56,39,0.18); }
    .btn-secondary:hover { background: rgba(22,56,39,0.04); }
    .hero { padding: 70px 0 42px; }
    .hero-grid {
      display: grid; grid-template-columns: 1.12fr .88fr; gap: 34px; align-items: center;
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 999px;
      background: rgba(169,125,47,0.10); color: var(--gold); font-weight: 700; font-size: .92rem;
      border: 1px solid rgba(169,125,47,0.18);
    }
    h1 {
      font-size: clamp(2.6rem, 5.4vw, 4.8rem);
      line-height: .98; margin: 18px 0 18px; letter-spacing: -0.04em;
      color: var(--forest);
    }
    .hero p.lead {
      font-size: 1.1rem; color: #445148; max-width: 690px; margin: 0 0 26px;
    }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 28px; }
    .mini-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 760px;
    }
    .stat {
      background: rgba(255,255,255,0.70); border: 1px solid rgba(22,56,39,0.08);
      border-radius: 18px; padding: 18px; box-shadow: var(--shadow);
    }
    .stat strong { display: block; color: var(--forest); font-size: 1.45rem; margin-bottom: 4px; }
    .stat span { color: var(--muted); font-size: .94rem; }
    .feature-card {
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.78));
      border: 1px solid rgba(22,56,39,0.08); border-radius: 30px; padding: 28px;
      box-shadow: var(--shadow);
    }
    .feature-card .logo-wrap {
      padding: 16px; border-radius: 22px; background: rgba(247,248,245,.92);
      border: 1px solid rgba(22,56,39,0.06);
    }
    .feature-card img { width: 100%; max-width: 380px; margin: 0 auto; }
    .best-seller {
      margin-top: 22px; padding: 24px; border-radius: 24px; background: var(--forest); color: white;
    }
    .best-seller small {
      text-transform: uppercase; letter-spacing: .18em; color: var(--gold-soft); font-weight: 700;
    }
    .best-seller h3 { margin: 12px 0 4px; font-size: 2rem; }
    .price { font-size: 3.35rem; font-weight: 800; letter-spacing: -0.04em; margin: 10px 0 10px; }
    .best-seller ul { padding-left: 18px; margin: 16px 0 0; color: rgba(255,255,255,.86); }
    section.block { padding: 34px 0; }
    .section-head { max-width: 720px; margin-bottom: 26px; }
    .section-head .tag {
      font-size: .86rem; letter-spacing: .18em; text-transform: uppercase; font-weight: 800;
      color: var(--gold);
    }
    .section-head h2 {
      margin: 10px 0 10px; font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1.02;
      color: var(--forest); letter-spacing: -0.03em;
    }
    .section-head p { color: var(--muted); font-size: 1.04rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .info-card {
      background: var(--white); border: 1px solid rgba(22,56,39,0.08); border-radius: 22px;
      padding: 22px; box-shadow: var(--shadow);
    }
    .info-card h3 { margin: 10px 0 8px; color: var(--forest); }
    .info-card p { color: var(--muted); margin: 0; font-size: .97rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .pricing-card {
      background: var(--white); border: 1px solid rgba(22,56,39,0.08); border-radius: 28px;
      padding: 28px; box-shadow: var(--shadow); position: relative;
    }
    .pricing-card.popular {
      background: linear-gradient(180deg, var(--forest), #112c1f);
      color: white; border-color: rgba(169,125,47,0.4);
      transform: translateY(-6px);
    }
    .pill {
      position: absolute; top: -12px; left: 24px; padding: 8px 12px; border-radius: 999px;
      background: var(--gold); color: white; font-size: .75rem; font-weight: 800; letter-spacing: .12em;
      text-transform: uppercase;
    }
    .pricing-card .plan { font-size: .88rem; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); }
    .pricing-card.popular .plan { color: var(--gold-soft); }
    .pricing-card h3 { margin: 10px 0 4px; font-size: 2.4rem; letter-spacing: -0.03em; }
    .pricing-card p.desc { margin: 0 0 16px; color: var(--muted); }
    .pricing-card.popular p.desc { color: rgba(255,255,255,.75); }
    .pricing-card ul { padding-left: 18px; margin: 0; }
    .pricing-card li { margin: 9px 0; }
    .split {
      display: grid; grid-template-columns: 1.1fr .9fr; gap: 18px;
    }
    .cta-banner {
      display: grid; grid-template-columns: 1.2fr .8fr; gap: 18px; align-items: center;
      background: linear-gradient(120deg, rgba(22,56,39,.98), rgba(32,74,51,.96));
      color: white; border-radius: 30px; padding: 34px; box-shadow: var(--shadow);
    }
    .cta-banner h2 { margin: 0 0 10px; font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1; }
    .cta-banner p { margin: 0; color: rgba(255,255,255,.76); }
    .contact-wrap {
      display: grid; grid-template-columns: .9fr 1.1fr; gap: 20px;
    }
    .contact-card, .form-card {
      background: var(--white); border: 1px solid rgba(22,56,39,0.08); border-radius: 28px;
      padding: 28px; box-shadow: var(--shadow);
    }
    .contact-card {
      background: linear-gradient(180deg, rgba(22,56,39,.98), rgba(17,44,31,.98)); color: white;
    }
    .contact-card h3 { font-size: 2rem; margin: 8px 0 10px; }
    .contact-card p, .contact-card li { color: rgba(255,255,255,.78); }
    .contact-card ul { padding-left: 18px; }
    form { display: grid; gap: 14px; }
    .row-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    label { display: block; font-size: .88rem; font-weight: 700; color: var(--forest); margin-bottom: 7px; }
    input, textarea {
      width: 100%; border: 1px solid rgba(22,56,39,0.12); border-radius: 16px; padding: 14px 14px;
      font: inherit; color: var(--ink); background: #fff;
    }
    input:focus, textarea:focus { outline: 2px solid rgba(169,125,47,0.28); border-color: var(--gold); }
    textarea { min-height: 130px; resize: vertical; }
    .note { font-size: .82rem; color: var(--muted); }
    footer { padding: 22px 0 44px; color: var(--muted); font-size: .92rem; }
    .footer-box {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      border-top: 1px solid rgba(22,56,39,0.08); padding-top: 20px;
    }
    @media (max-width: 980px) {
      .hero-grid, .grid-4, .grid-3, .split, .cta-banner, .contact-wrap { grid-template-columns: 1fr; }
      .mini-stats { grid-template-columns: 1fr; }
      .menu a.link { display: none; }
    }
    @media (max-width: 720px) {
      .hero { padding-top: 42px; }
      .nav-inner { padding: 12px 0; }
      .brand img { width: 46px; }
      .row-2 { grid-template-columns: 1fr; }
      .pricing-card.popular { transform: none; }
      .container { width: min(1160px, calc(100% - 22px)); }
      .btn { width: 100%; }
      .hero-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <div class="brand">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABgAAA AQACAIAAADwf7zUA...TRUNCATED" alt="NF logo" />
        <div class="brand-copy">
          <strong>Nicolas Fernandez</strong>
          <span>Landing Pages for Local Businesses</span>
        </div>
      </div>
      <div class="menu">
        <a class="link" href="#services">Services</a>
        <a class="link" href="#pricing">Pricing</a>
        <a class="link" href="#contact">Contact</a>
        <a class="btn btn-primary" href="https://wa.me/573000000000?text=Hi%20Nicolas,%20I%27m%20interested%20in%20a%20landing%20page%20for%20my%20business.">WhatsApp</a>
      </div>
    </div>
  </nav>
</body>
</html>
